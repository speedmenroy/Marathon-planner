<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PaceForge</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--card:#242424;--elevated:#2e2e2e;
  --accent:#e8602a;--text:#f0f0f0;--muted:#a0a0a0;--border:#3a3a3a;
  --base:#60a5fa;--build:#fb923c;--peak:#f87171;--taper:#34d399;
  --nav-bg:#1f1f1f;--radius-card:14px;--radius-btn:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input,select,textarea{font-family:inherit;color:var(--text);background:var(--elevated);border:1px solid var(--border);border-radius:8px;outline:none;font-size:16px}
input:focus,select:focus{border-color:var(--accent)}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
#main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
.tab-section{display:none;min-height:calc(100vh - 64px);padding-bottom:24px}
.tab-section.active{display:block}

/* Bottom Nav */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(60px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--nav-bg);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:44px;min-height:44px;font-size:12px;color:var(--muted);transition:color .2s;padding:6px 2px;padding-bottom:0}
.nav-tab.active{color:var(--accent)}
.nav-tab .tab-icon{font-size:20px;line-height:1}
.nav-tab .tab-label{font-size:11px;font-weight:500}

/* Cards */
.card{background:var(--card);border-radius:var(--radius-card);padding:16px;margin:0 12px 12px}
.card-elevated{background:var(--elevated)}

/* Section header */
.section-header{position:sticky;top:0;z-index:10;background:var(--bg);padding:16px 12px 8px;border-bottom:1px solid var(--border)}
.section-header h2{font-size:18px;font-weight:700}
.page-pad{padding:12px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 12px 12px}
.stat-card{background:var(--card);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:12px;color:var(--muted)}
.stat-value{font-size:22px;font-weight:700;color:var(--text)}
.stat-sub{font-size:12px;color:var(--muted)}

/* Progress bar */
.progress-bar{height:6px;background:var(--elevated);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}

/* Badges & chips */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-base{background:rgba(96,165,250,.18);color:var(--base)}
.badge-build{background:rgba(251,146,60,.18);color:var(--build)}
.badge-peak{background:rgba(248,113,113,.18);color:var(--peak)}
.badge-taper{background:rgba(52,211,153,.18);color:var(--taper)}
.badge-upcoming{background:rgba(232,96,42,.18);color:var(--accent)}
.badge-completed{background:rgba(52,211,153,.18);color:var(--taper)}
.badge-5k{background:rgba(96,165,250,.18);color:var(--base)}
.badge-10k{background:rgba(251,146,60,.18);color:var(--build)}
.badge-hm{background:rgba(248,113,113,.18);color:var(--peak)}
.badge-fm{background:rgba(232,96,42,.18);color:var(--accent)}

/* Horizontal scroll chips */
.chip-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 12px 8px;scrollbar-width:none}
.chip-scroll::-webkit-scrollbar{display:none}
.chip{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);color:var(--muted);background:var(--card);min-height:36px;white-space:nowrap;transition:all .2s}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Workout item */
.workout-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.workout-item:last-child{border-bottom:none}
.workout-icon{width:40px;height:40px;border-radius:10px;background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.workout-info{flex:1;min-width:0}
.workout-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.workout-meta{font-size:12px;color:var(--muted)}
.workout-km{font-size:13px;font-weight:600;color:var(--accent)}

/* Chart containers */
.chart-wrap{position:relative;width:100%;overflow:hidden}

/* FAB */
.fab{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 16px rgba(232,96,42,.4);transition:transform .15s}
.fab:active{transform:scale(.92)}
.fab.hidden{display:none}

/* Bottom sheet / drawer */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.4,1);max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.sheet-header h3{font-size:17px;font-weight:700}
.sheet-close{width:32px;height:32px;border-radius:50%;background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}

/* Form inputs */
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px;font-size:16px;border-radius:8px}
.form-select{width:100%;padding:12px;font-size:16px;border-radius:8px;appearance:none}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.btn-primary{background:var(--accent);color:#fff;border-radius:var(--radius-btn);padding:13px 20px;font-size:15px;font-weight:600;width:100%;min-height:44px;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-outline{border:1px solid var(--border);border-radius:var(--radius-btn);padding:9px 14px;font-size:13px;font-weight:500;color:var(--text);min-height:40px;white-space:nowrap;transition:all .15s}
.btn-outline:active{background:var(--elevated)}

/* Race card */
.race-card{background:var(--card);border-radius:var(--radius-card);padding:16px;margin:0 12px 12px;cursor:pointer;transition:background .15s}
.race-card:active{background:var(--elevated)}
.race-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.race-card-title{font-size:16px;font-weight:700}
.race-card-meta{font-size:13px;color:var(--muted);margin-top:4px}
.race-expand{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.race-expand.open{display:block}
.race-notes{font-size:14px;color:var(--muted);line-height:1.6}
.alert-item{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* Planner */
.inputs-row{display:flex;gap:10px;padding:0 12px;margin-bottom:12px}
.inputs-row .form-group{flex:1}
.inputs-row .form-input{padding:10px;font-size:16px}
.phase-bar{height:10px;display:flex;border-radius:5px;overflow:hidden;margin:0 12px 12px}
.phase-seg{transition:flex .4s}
.summary-row{display:flex;gap:8px;margin:0 12px 12px;flex-wrap:wrap}
.summary-item{flex:1;min-width:70px;background:var(--card);border-radius:10px;padding:10px;text-align:center}
.summary-item .sv{font-size:16px;font-weight:700}
.summary-item .sl{font-size:11px;color:var(--muted);margin-top:2px}

/* Week accordion */
.week-row{border-bottom:1px solid var(--border);padding:0 12px}
.week-header{display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer;min-height:44px}
.week-num{font-size:13px;font-weight:700;width:28px;flex-shrink:0}
.week-info{flex:1}
.week-km{font-size:14px;font-weight:600;color:var(--accent)}
.week-focus{font-size:12px;color:var(--muted)}
.week-chevron{color:var(--muted);transition:transform .25s;font-size:14px}
.week-chevron.open{transform:rotate(180deg)}
.week-days{display:none;padding-bottom:12px}
.week-days.open{display:block}
.day-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.day-row:last-child{border-bottom:none}
.day-label{width:36px;font-size:12px;color:var(--muted);font-weight:600;flex-shrink:0}
.day-icon{width:28px;height:28px;border-radius:7px;background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.day-name{flex:1;font-size:13px}
.day-km{font-size:12px;font-weight:600;color:var(--accent)}

/* Nutrition */
.pill-tabs{display:flex;gap:6px;padding:12px;background:var(--bg);position:sticky;top:49px;z-index:9}
.pill-tab{flex:1;padding:9px 6px;border-radius:20px;font-size:13px;font-weight:500;text-align:center;border:1px solid var(--border);color:var(--muted);min-height:36px;transition:all .2s}
.pill-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pill-content{display:none}
.pill-content.active{display:block}

/* Expandable card */
.expand-card{background:var(--card);border-radius:var(--radius-card);margin:0 12px 10px;overflow:hidden}
.expand-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;min-height:44px}
.expand-title{font-size:15px;font-wei
