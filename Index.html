<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaceForge — Marathon Training</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --card: #242424;
    --card-elevated: #2e2e2e;
    --primary: #e8602a;
    --primary-dim: rgba(232,96,42,0.15);
    --text: #f0f0f0;
    --muted: #a0a0a0;
    --border: #3a3a3a;
    --success: #34d399;
    --info: #60a5fa;
    --warn: #fb923c;
    --danger: #f87171;
    --nav-w: 220px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 12px;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SIDEBAR NAV ── */
  .sidebar {
    width: var(--nav-w);
    min-width: var(--nav-w);
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
    overflow-y: auto;
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--primary);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 20px; height: 20px; fill: #fff; }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .nav-section { padding: 16px 0 8px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1px; padding: 0 18px 6px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 0;
    transition: color 0.15s, background 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .nav-item.active { color: var(--primary); background: var(--primary-dim); font-weight: 600; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 18px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }

  /* ── MAIN CONTENT ── */
  .main {
    margin-left: var(--nav-w);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .page { display: none; padding: 28px 28px 48px; max-width: 1100px; }
  .page.active { display: block; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 24px; }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .page-subtitle { font-size: 14px; color: var(--muted); margin-top: 4px; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-elevated {
    background: var(--card-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-value { font-size: 28px; font-weight: 700; color: var(--text); }
  .card-delta { font-size: 12px; color: var(--success); margin-top: 4px; }

  /* ── GRID UTILITIES ── */
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }

  /* ── STAT CARDS ── */
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-accent { color: var(--primary); }

  /* ── SECTION HEADING ── */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    text-decoration: none;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); opacity: 1; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-info { background: rgba(96,165,250,0.15); color: var(--info); border: 1px solid rgba(96,165,250,0.3); }
  .btn-success { background: rgba(52,211,153,0.15); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }

  /* ── BADGES ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge-upcoming { background: rgba(96,165,250,0.15); color: var(--info); }
  .badge-completed { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge-primary { background: var(--primary-dim); color: var(--primary); }
  .badge-blue { background: rgba(96,165,250,0.12); color: #93c5fd; }
  .badge-orange { background: rgba(251,146,60,0.12); color: #fdba74; }
  .badge-red { background: rgba(248,113,113,0.12); color: #fca5a5; }
  .badge-green { background: rgba(52,211,153,0.12); color: #6ee7b7; }
  .badge-purple { background: rgba(167,139,250,0.12); color: #c4b5fd; }
  .badge-essential { background: rgba(248,113,113,0.15); color: var(--danger); }
  .badge-recommended { background: rgba(96,165,250,0.15); color: var(--info); }
  .badge-conditional { background: rgba(251,146,60,0.15); color: var(--warn); }
  .badge-optional { background: rgba(160,160,160,0.12); color: var(--muted); }

  /* ── FORMS ── */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-control {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-control:focus { border-color: var(--primary); }
  .form-control option { background: var(--card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* ── TABS (sub-tabs inside pages) ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
  .tab-btn {
    flex: 1; padding: 8px 14px;
    font-size: 13px; font-weight: 600;
    color: var(--muted);
    background: none; border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .tab-btn.active { background: var(--card-elevated); color: var(--text); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── LEVEL SELECTOR ── */
  .level-btns { display: flex; gap: 8px; margin-bottom: 20px; }
  .level-btn {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    background: var(--card-elevated);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .level-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .level-btn:hover:not(.active) { color: var(--text); border-color: #555; }

  /* ── CHART CONTAINER ── */
  .chart-wrap { position: relative; width: 100%; }
  .chart-wrap canvas { width: 100% !important; }

  /* ── WORKOUT ROW ── */
  .workout-row {
    display: flex; align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .workout-row:last-child { border-bottom: none; }
  .workout-icon {
    width: 36px; height: 36px;
    background: var(--primary-dim);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--primary);
    font-size: 16px;
  }
  .workout-info { flex: 1; }
  .workout-name { font-size: 14px; font-weight: 600; }
  .workout-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .workout-km { font-size: 14px; font-weight: 700; color: var(--primary); }

  /* ── PLAN WEEK ROWS ── */
  .plan-week {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .plan-week-header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    cursor: pointer;
    background: var(--card);
    transition: background 0.15s;
    user-select: none;
  }
  .plan-week-header:hover { background: var(--card-elevated); }
  .plan-week-phase { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .plan-week-label { font-size: 13px; font-weight: 700; min-width: 60px; }
  .plan-week-phase-name { font-size: 12px; color: var(--muted); flex: 1; }
