<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaceForge v3</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500&f[]=satoshi@700,500,400&f[]=jet-brains-mono@400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Satoshi', sans-serif;
  background: #1a1a1a;
  color: #f0f0f0;
  min-height: 100vh;
  overflow-x: hidden;
}
h1,h2,h3,h4,h5,h6 { font-family: 'Cabinet Grotesk', sans-serif; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* ─── CSS Variables ─────────────────────────────────────────────── */
:root {
  --bg: #1a1a1a;
  --surface: #242424;
  --surface2: #2e2e2e;
  --border: #3a3a3a;
  --accent: #e8602a;
  --accent-dim: rgba(232,96,42,0.15);
  --green: #4caf50;
  --green-dim: rgba(76,175,80,0.15);
  --text: #f0f0f0;
  --text-2: #a0a0a0;
  --blue: #4a9eff;
  --red: #f44336;
  --orange: #ff9800;
  --purple: #9c27b0;
  --nav-w: 250px;
  --nav-h: 64px;
  --radius: 12px;
  --radius-sm: 8px;
}

/* ─── Layout ─────────────────────────────────────────────────────── */
.app-layout {
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: var(--nav-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
}
.main-content {
  margin-left: var(--nav-w);
  flex: 1;
  min-height: 100vh;
  padding: 0;
}
.page {
  display: none;
  padding: 32px;
  max-width: 1200px;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ─── Sidebar ─────────────────────────────────────────────────────── */
.sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.app-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--text);
}
.app-logo svg { width: 32px; height: 32px; }
.app-logo-text { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--accent); }

.sync-indicator {
  margin-top: 10px;
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.75rem; padding: 4px 10px;
  border-radius: 20px; font-weight: 500;
  transition: all 0.3s;
}
.sync-indicator.synced { background: var(--green-dim); color: var(--green); }
.sync-indicator.syncing { background: rgba(255,152,0,0.15); color: var(--orange); }
.sync-indicator.offline { background: rgba(244,67,54,0.15); color: var(--red); }

.nav-links { padding: 12px 0; flex: 1; }
.nav-link {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  color: var(--text-2);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  border-radius: 0;
  transition: all 0.15s;
  cursor: pointer;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-link:hover { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--accent); background: var(--accent-dim); border-right: 3px solid var(--accent); }
.nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ─── Top header (mobile) ──────────────────────────────────────────── */
.mobile-header {
  display: none;
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 100;
}
.mobile-header .app-logo-text { font-size: 1.2rem; }
.mobile-sync { font-size: 0.72rem; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.mobile-sync.synced { background: var(--green-dim); color: var(--green); }
.mobile-sync.syncing { background: rgba(255,152,0,0.15); color: var(--orange); }
.mobile-sync.offline { background: rgba(244,67,54,0.15); color: var(--red); }

/* ─── Bottom Tab Bar (mobile) ─────────────────────────────────────── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 100;
  height: 60px;
  overflow-x: auto;
  scrollbar-width: none;
}
.bottom-nav::-webkit-scrollbar { display: none; }
.bottom-nav-inner {
  display: flex; align-items: center;
  height: 60px; padding: 0 8px;
  min-width: max-content;
}
.bottom-nav-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 0 12px; height: 52px;
  color: var(--text-2); font-size: 0.65rem; font-weight: 500;
  cursor: pointer; border: none; background: none;
  white-space: nowrap; transition: color 0.15s;
}
.bottom-nav-item svg { width: 20px; height: 20px; }
.bottom-nav-item.active { color: var(--accent); }

/* ─── Responsive ──────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; padding-top: 56px; padding-bottom: 70px; }
  .mobile-header { display: flex; }
  .bottom-nav { display: block; }
  .page { padding: 20px 16px; }
}

/* ─── Cards ───────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.card-sm {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
}

/* ─── Buttons ─────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-family: 'Satoshi', sans-serif; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s;
  text-decoration: none;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #d4541f; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: #383838; }
.btn-danger { background: rgba(244,67,54,0.15); color: var(--red); border: 1px solid rgba(244,67,54,0.3); }
.btn-danger:hover { background: rgba(244,67,54,0.25); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-ghost { background: none; color: var(--text-2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }

/* ─── Forms ───────────────────────────────────────────────────────── */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 0.82rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.04em; }
.form-input, .form-select, .form-textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'Satoshi', sans-serif; font-size: 0.9rem;
  padding: 10px 12px; transition: border-color 0.15s;
  width: 100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none; border-color: var(--accent);
}
.form-input::placeholder { color: var(--text-2); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

/* ─── Modal ───────────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 1000;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  padding: 28px;
  position: relative;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity:0; transform: scale(0.96) translateY(-10px); } to { opacity:1; transform: scale(1) translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-family: 'Cabinet Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; border: none; background: var(--surface2); cursor: pointer; color: var(--text-2);
  transition: all 0.15s;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ─── Page Headers ─────────────────────────────────────────────────── */
.page-header { margin-bottom: 28px; }
.page-title { font-size: 2rem; font-weight: 800; }
.page-subtitle { color: var(--text-2); margin-top: 4px; }
.page-header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

/* ─── Stats ───────────────────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
@media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
}
.stat-label { font-size: 0.78rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 400; color: var(--accent); }
.stat-sub { font-size: 0.78rem; color: var(--text-2); margin-top: 4px; }
